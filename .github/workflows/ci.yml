name: CI – Validate Bicep

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  RESOURCE_GROUP: rg-workshop-aml-dev
  LOCATION: eastus

jobs:
  validate-bicep:
    name: Lint & validate Bicep templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Compile the template – catches syntax and type errors
      - name: Build Bicep (lint)
        run: az bicep build --file infra/main.bicep

      # Validate against Azure without deploying anything
      - name: Validate Dev deployment
        run: |
          az group create \
            --name     ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags env=dev \
            --output none
          az deployment group validate \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file  infra/main.bicep \
            --parameters     infra/dev.bicepparam
