name: CD – Dev → Production

# Runs on every push to main (after a PR is merged).
# Dev deploys automatically; Production is gated by manual approval
# configured on the GitHub "production" Environment.
on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  LOCATION: eastus

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 – Deploy to Dev  (no approval gate)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: rg-workshop-aml-dev
    outputs:
      workspace_name: ${{ steps.infra.outputs.workspaceName }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 1. Infrastructure ──────────────────────────────────────────────────
      - name: Deploy Dev infrastructure (Bicep)
        id: infra
        run: |
          az group create \
            --name     ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags     env=dev \
            --output none

          OUTPUT=$(az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file  infra/main.bicep \
            --parameters     infra/dev.bicepparam \
            --query          "properties.outputs" \
            --output         json)

          echo "workspaceName=$(echo "$OUTPUT" | jq -r '.workspaceName.value')" >> "$GITHUB_OUTPUT"
          echo "principalId=$(echo "$OUTPUT"  | jq -r '.workspacePrincipalId.value')" >> "$GITHUB_OUTPUT"
          echo "storageId=$(echo "$OUTPUT"    | jq -r '.storageId.value')"            >> "$GITHUB_OUTPUT"
          echo "acrId=$(echo "$OUTPUT"        | jq -r '.acrId.value')"                >> "$GITHUB_OUTPUT"
          echo "kvId=$(echo "$OUTPUT"         | jq -r '.kvId.value')"                 >> "$GITHUB_OUTPUT"

      # Sync ACR admin credentials into the workspace so serverless compute can pull images
      - name: Sync workspace keys
        run: |
          az ml workspace sync-keys \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ steps.infra.outputs.workspaceName }}

      # ── 1b. Grant workspace identity roles (idempotent) ───────────────────
      - name: Grant workspace role assignments
        run: |
          assign() {
            OUT=$(az role assignment create \
              --assignee-object-id "$1" \
              --assignee-principal-type ServicePrincipal \
              --role "$2" --scope "$3" 2>&1) || \
            echo "$OUT" | grep -q 'RoleAssignmentExists' || { echo "$OUT"; exit 1; }
          }
          P=${{ steps.infra.outputs.principalId }}
          assign "$P" ba92f5b4-2d11-453d-a403-e96b0029c9fe ${{ steps.infra.outputs.storageId }}
          assign "$P" 8311e382-0749-4cb8-b61a-304f252e45ec ${{ steps.infra.outputs.acrId }}
          assign "$P" 7f951dda-4ed3-4680-a7ca-43fe172d538d ${{ steps.infra.outputs.acrId }}
          assign "$P" b86a8fe4-44ce-4948-aee5-eccb2c155cd7 ${{ steps.infra.outputs.kvId }}
          echo "Waiting 60s for RBAC propagation..."
          sleep 60

      # ── 2. ML pipeline (train + register model) ────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run AML pipeline – train & register model
        run: |
          python src/pipeline/pipeline.py \
            --subscription-id ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --workspace-name  ${{ steps.infra.outputs.workspaceName }}

      # ── 3. Deploy model to Dev endpoint ───────────────────────────────────
      - name: Deploy model to Dev managed endpoint
        run: |
          python src/pipeline/deploy.py \
            --subscription-id ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --workspace-name  ${{ steps.infra.outputs.workspaceName }} \
            --endpoint-name   diabetes-endpoint-dev

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 – Deploy to Production  (GATED – requires manual approval)
#
# Set up the gate:
#   GitHub repo → Settings → Environments → production
#   → Enable "Required reviewers" and add approvers.
# ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production        # ← workflow pauses here until approved
    env:
      RESOURCE_GROUP: rg-aml-prod

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 1. Infrastructure ──────────────────────────────────────────────────
      - name: Deploy Prod infrastructure (Bicep)
        id: infra
        run: |
          az group create \
            --name     ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags     env=prod \
            --output none

          OUTPUT=$(az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file  infra/main.bicep \
            --parameters     infra/prod.bicepparam \
            --query          "properties.outputs" \
            --output         json)

          echo "workspaceName=$(echo "$OUTPUT" | jq -r '.workspaceName.value')" >> "$GITHUB_OUTPUT"
          echo "principalId=$(echo "$OUTPUT"  | jq -r '.workspacePrincipalId.value')" >> "$GITHUB_OUTPUT"
          echo "storageId=$(echo "$OUTPUT"    | jq -r '.storageId.value')"            >> "$GITHUB_OUTPUT"
          echo "acrId=$(echo "$OUTPUT"        | jq -r '.acrId.value')"                >> "$GITHUB_OUTPUT"
          echo "kvId=$(echo "$OUTPUT"         | jq -r '.kvId.value')"                 >> "$GITHUB_OUTPUT"

      # Sync ACR admin credentials into the workspace so serverless compute can pull images
      - name: Sync workspace keys
        run: |
          az ml workspace sync-keys \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ steps.infra.outputs.workspaceName }}

      # ── 1b. Grant workspace identity roles (idempotent) ───────────────────
      - name: Grant workspace role assignments
        run: |
          assign() {
            OUT=$(az role assignment create \
              --assignee-object-id "$1" \
              --assignee-principal-type ServicePrincipal \
              --role "$2" --scope "$3" 2>&1) || \
            echo "$OUT" | grep -q 'RoleAssignmentExists' || { echo "$OUT"; exit 1; }
          }
          P=${{ steps.infra.outputs.principalId }}
          assign "$P" ba92f5b4-2d11-453d-a403-e96b0029c9fe ${{ steps.infra.outputs.storageId }}
          assign "$P" 8311e382-0749-4cb8-b61a-304f252e45ec ${{ steps.infra.outputs.acrId }}
          assign "$P" 7f951dda-4ed3-4680-a7ca-43fe172d538d ${{ steps.infra.outputs.acrId }}
          assign "$P" b86a8fe4-44ce-4948-aee5-eccb2c155cd7 ${{ steps.infra.outputs.kvId }}
          echo "Waiting 60s for RBAC propagation..."
          sleep 60

      # ── 2. ML pipeline (train + register model in Prod workspace) ──────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run AML pipeline – train & register model
        run: |
          python src/pipeline/pipeline.py \
            --subscription-id ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --workspace-name  ${{ steps.infra.outputs.workspaceName }}

      # ── 3. Deploy model to Prod endpoint ───────────────────────────────────
      - name: Deploy model to Prod managed endpoint
        run: |
          python src/pipeline/deploy.py \
            --subscription-id ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --workspace-name  ${{ steps.infra.outputs.workspaceName }} \
            --endpoint-name   diabetes-endpoint-prod
